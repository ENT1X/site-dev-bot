<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteDev — Mini App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>🖥 SiteDev</h1>
            <p>Разработка сайтов под ключ</p>
        </header>

        <nav>
            <button class="nav-btn active" data-page="profile">👤 Профиль</button>
            <button class="nav-btn" data-page="orders">📋 Заказы</button>
            <button class="nav-btn" data-page="portfolio">📂 Портфолио</button>
        </nav>

        <main id="content">
            <!-- Динамически заполняется -->
        </main>

        <footer>
            <button id="orderBtn" class="primary-btn">📝 Заказать сайт</button>
            <button id="feedbackBtn" class="secondary-btn">💬 Связаться с нами</button>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
