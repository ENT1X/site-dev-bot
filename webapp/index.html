<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SiteDev</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="header">
    <div class="header-glow"></div>
    <div class="header-content">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="12" fill="currentColor" opacity="0.2"/>
          <path d="M12 28L20 12L28 28H12Z" fill="currentColor" opacity="0.9"/>
          <path d="M16 22H24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>SiteDev</h1>
        <p>Студия веб-разработки</p>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-item active" data-page="profile">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3" fill="currentColor"/><path d="M3 18c0-4 3-7 7-7s7 3 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Профиль
    </button>
    <button class="nav-item" data-page="orders">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Заказы
    </button>
    <button class="nav-item" data-page="portfolio">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="7" cy="9" r="1.5" fill="currentColor"/><path d="M2 13l4-3 3 2 4-3.5 5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Портфолио
    </button>
  </div>

  <main id="content"></main>

  <div class="actions">
    <button id="orderBtn" class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 4v10M4 9h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Заказать сайт
    </button>
    <button id="feedbackBtn" class="btn btn-secondary">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 3h12v10H6l-3 3V3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      Связаться
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
